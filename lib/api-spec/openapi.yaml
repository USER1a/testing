openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MovieBox Player API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: streams
    description: Stream URL resolution
  - name: search
    description: Movie & TV show search
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /streams:
    get:
      operationId: getStreams
      tags: [streams]
      summary: Get stream URLs for a MovieBox URL
      description: >
        Fetches the available MP4/HLS/DASH stream URLs for a given
        themoviebox.org movie or TV episode URL.
      parameters:
        - name: url
          in: query
          required: true
          description: Full MovieBox movie page URL
          schema:
            type: string
        - name: se
          in: query
          required: false
          description: Season number (0 for movies)
          schema:
            type: integer
        - name: ep
          in: query
          required: false
          description: Episode number (0 for movies)
          schema:
            type: integer
      responses:
        "200":
          description: Stream URLs found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No streams found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /search:
    get:
      operationId: searchTitles
      tags: [search]
      summary: Search for movies and TV shows by title
      description: >
        Searches the MovieBox catalogue by title. Supports natural language
        queries including language and platform tags (e.g. "One Piece [netflix]
        [Filipino]"). Returns matching titles with their movieboxUrl and an
        iframeUrl ready to embed in your app.
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (e.g. "One Piece [netflix] [Filipino]")
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: Page number (default 1)
          schema:
            type: integer
            default: 1
        - name: perPage
          in: query
          required: false
          description: Results per page (max 50, default 10)
          schema:
            type: integer
            default: 10
        - name: playerBase
          in: query
          required: false
          description: >
            Base URL of the player (e.g. "https://myapp.replit.app").
            Used to construct the iframeUrl in the response. If omitted the
            server infers it from the request host headers.
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResult"
        "400":
          description: Missing or invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Stream:
      type: object
      properties:
        id:
          type: string
        format:
          type: string
        url:
          type: string
        resolutions:
          type: string
        size:
          type: string
        duration:
          type: integer
        codecName:
          type: string
      required:
        - id
        - format
        - url
        - resolutions
        - size
        - duration
        - codecName
    StreamResult:
      type: object
      properties:
        success:
          type: boolean
        subjectId:
          type: string
        slug:
          type: string
        title:
          type: string
        coverUrl:
          type: string
        se:
          type: integer
        ep:
          type: integer
        streams:
          type: array
          items:
            $ref: "#/components/schemas/Stream"
        hls:
          type: array
          items:
            type: string
        dash:
          type: array
          items:
            type: string
        freeNum:
          type: integer
        limited:
          type: boolean
      required:
        - success
        - subjectId
        - slug
        - se
        - ep
        - streams
        - hls
        - dash
        - freeNum
        - limited
    SearchResultItem:
      type: object
      properties:
        subjectId:
          type: string
        subjectType:
          type: integer
          description: "1 = movie, 2 = TV show"
        title:
          type: string
        detailPath:
          type: string
        coverUrl:
          type: string
          nullable: true
        releaseDate:
          type: string
        genre:
          type: string
        imdbRating:
          type: string
        subtitles:
          type: string
        duration:
          type: integer
        country:
          type: string
        movieboxUrl:
          type: string
          description: Direct URL to the MovieBox page
        iframeUrl:
          type: string
          description: Ready-to-embed iframe URL that auto-loads this title in the player
      required:
        - subjectId
        - subjectType
        - title
        - detailPath
        - releaseDate
        - genre
        - imdbRating
        - subtitles
        - duration
        - country
        - movieboxUrl
        - iframeUrl
    SearchResult:
      type: object
      properties:
        success:
          type: boolean
        query:
          type: string
        page:
          type: integer
        perPage:
          type: integer
        total:
          type: integer
        hasMore:
          type: boolean
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResultItem"
      required:
        - success
        - query
        - page
        - perPage
        - total
        - hasMore
        - results
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string
      required:
        - success
        - error
